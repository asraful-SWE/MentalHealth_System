<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - MindCare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="bg-gray-100 min-h-screen d-flex align-items-center">
  <div class="container py-4">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="text-center mb-4">
          <a href="../index.html" class="text-decoration-none">
            <i class="fas fa-brain fs-1" style="color: #667eea;"></i>
            <h3 class="fw-bold mt-2" style="color: #4f46e5;">MindCare</h3>
          </a>
        </div>
        <div class="card border-0 shadow-lg rounded-4">
          <div class="card-body p-5">
            <h4 class="fw-bold text-center mb-1">Create Account</h4>
            <p class="text-center text-muted mb-4">Start your well-being journey</p>
            
            <div id="registerAlert" class="alert d-none"></div>
            
            <form id="registerForm">
              <div class="mb-3">
                <label class="form-label fw-semibold">Full Name</label>
                <div class="input-group">
                  <span class="input-group-text bg-light"><i class="fas fa-user text-muted"></i></span>
                  <input type="text" class="form-control py-2" id="regName" placeholder="John Doe" required minlength="2" />
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Email Address</label>
                <div class="input-group">
                  <span class="input-group-text bg-light"><i class="fas fa-envelope text-muted"></i></span>
                  <input type="email" class="form-control py-2" id="regEmail" placeholder="you@example.com" required />
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-light"><i class="fas fa-lock text-muted"></i></span>
                  <input type="password" class="form-control py-2" id="regPassword" placeholder="Min 6 characters" required minlength="6" />
                </div>
              </div>
              <div class="mb-4">
                <label class="form-label fw-semibold">Confirm Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-light"><i class="fas fa-lock text-muted"></i></span>
                  <input type="password" class="form-control py-2" id="regConfirmPassword" placeholder="Repeat password" required />
                </div>
              </div>
              <button type="submit" class="btn w-100 py-2 text-white fw-semibold rounded-3"
                      style="background: linear-gradient(135deg, #667eea, #764ba2);" id="registerBtn">
                <i class="fas fa-user-plus me-2"></i>Create Account
              </button>
            </form>
            <div class="text-center mt-4">
              <p class="text-muted">Already have an account? 
                <a href="login.html" class="fw-semibold" style="color: #667eea;">Login</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js?v=20260312"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alertEl = document.getElementById('registerAlert');
      const btn = document.getElementById('registerBtn');
      
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const confirmPassword = document.getElementById('regConfirmPassword').value;
      
      if (password !== confirmPassword) {
        alertEl.className = 'alert alert-danger';
        alertEl.textContent = 'Passwords do not match';
        alertEl.classList.remove('d-none');
        return;
      }
      
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Creating Account...';
      alertEl.classList.add('d-none');
      
      try {
        const res = await API.post('/auth/register', { name, email, password });
        saveAuth(res.data.data.token, res.data.data.user);
        
        alertEl.className = 'alert alert-success';
        alertEl.textContent = 'Registration successful! Redirecting...';
        alertEl.classList.remove('d-none');
        
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 800);
      } catch (err) {
        alertEl.className = 'alert alert-danger';
        alertEl.textContent = err.response?.data?.message || 'Registration failed';
        alertEl.classList.remove('d-none');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Create Account';
      }
    });
  </script>
</body>
</html>
