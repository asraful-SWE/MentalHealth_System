<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - MindCare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="bg-gray-100 min-h-screen d-flex align-items-center">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="text-center mb-4">
          <a href="../index.html" class="text-decoration-none">
            <i class="fas fa-brain fs-1" style="color: #667eea;"></i>
            <h3 class="fw-bold mt-2" style="color: #4f46e5;">MindCare</h3>
          </a>
        </div>
        <div class="card border-0 shadow-lg rounded-4">
          <div class="card-body p-5">
            <h4 class="fw-bold text-center mb-1">Welcome Back</h4>
            <p class="text-center text-muted mb-4">Sign in to continue</p>
            
            <div id="loginAlert" class="alert d-none"></div>
            
            <form id="loginForm">
              <div class="mb-3">
                <label class="form-label fw-semibold">Email Address</label>
                <div class="input-group">
                  <span class="input-group-text bg-light"><i class="fas fa-envelope text-muted"></i></span>
                  <input type="email" class="form-control py-2" id="loginEmail" placeholder="you@example.com" required />
                </div>
              </div>
              <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-light"><i class="fas fa-lock text-muted"></i></span>
                  <input type="password" class="form-control py-2" id="loginPassword" placeholder="Enter password" required />
                </div>
              </div>
              <button type="submit" class="btn w-100 py-2 text-white fw-semibold rounded-3"
                      style="background: linear-gradient(135deg, #667eea, #764ba2);" id="loginBtn">
                <i class="fas fa-sign-in-alt me-2"></i>Login
              </button>
            </form>
            <div class="text-center mt-4">
              <p class="text-muted">Don't have an account? 
                <a href="register.html" class="fw-semibold" style="color: #667eea;">Register</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js?v=20260312"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alertEl = document.getElementById('loginAlert');
      const btn = document.getElementById('loginBtn');
      
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Logging in...';
      alertEl.classList.add('d-none');
      
      try {
        const res = await API.post('/auth/login', { email, password });
        saveAuth(res.data.data.token, res.data.data.user);
        
        alertEl.className = 'alert alert-success';
        alertEl.textContent = 'Login successful! Redirecting...';
        alertEl.classList.remove('d-none');
        
        setTimeout(() => {
          if (res.data.data.user.role === 'admin') {
            window.location.href = 'admin.html';
          } else {
            window.location.href = 'dashboard.html';
          }
        }, 800);
      } catch (err) {
        alertEl.className = 'alert alert-danger';
        alertEl.textContent = err.response?.data?.message || 'Login failed';
        alertEl.classList.remove('d-none');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Login';
      }
    });
  </script>
</body>
</html>
