<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Results - MindCare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="bg-gray-50">
  <!-- Navbar -->
  <nav class="navbar shadow-sm" style="background: linear-gradient(135deg, #667eea, #764ba2);">
    <div class="container">
      <a class="navbar-brand text-white fw-bold fs-4" href="../index.html">
        <i class="fas fa-brain me-2"></i>MindCare
      </a>
      <div class="d-flex ms-auto align-items-center" id="navbarNav">
        <ul class="navbar-nav d-flex flex-row align-items-center gap-2" id="navLinks"></ul>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        
        <!-- Loading state -->
        <div id="loadingState" class="text-center py-5">
          <div class="spinner-border" style="color: #667eea;" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
          <p class="text-muted mt-3">Analyzing your responses with AI...</p>
        </div>

        <!-- Results Content -->
        <div id="resultsContent" style="display:none;">
          <!-- Risk Level Card -->
          <div class="card border-0 shadow-lg rounded-4 mb-4 overflow-hidden" id="riskMainCard">
            <div class="card-body text-center p-5" id="riskHeader">
              <div class="mb-3">
                <i class="fas fa-shield-alt" style="font-size: 3rem;" id="riskIcon"></i>
              </div>
              <h3 class="fw-bold mb-2" id="riskTitle">Risk Level</h3>
              <div id="riskBadgeLarge" class="mb-3"></div>
              <p class="mb-0 opacity-75" id="riskDescription"></p>
            </div>
          </div>

          <!-- Recommendations Panel -->
          <div class="card border-0 shadow-sm rounded-4 mb-4">
            <div class="card-header bg-white border-0 pt-4 px-4">
              <h5 class="fw-bold mb-0">
                <i class="fas fa-lightbulb text-warning me-2"></i>Personalized Recommendations
              </h5>
            </div>
            <div class="card-body px-4 pb-4" id="recommendationsContainer">
            </div>
          </div>

          <!-- Actions -->
          <div class="text-center">
            <a href="dashboard.html" class="btn text-white px-4 py-2 rounded-pill me-2 shadow-sm"
               style="background: linear-gradient(135deg, #667eea, #764ba2);">
              <i class="fas fa-chart-line me-2"></i>View Dashboard
            </a>
            <a href="assessment.html" class="btn btn-outline-secondary px-4 py-2 rounded-pill">
              <i class="fas fa-redo me-2"></i>Take Again
            </a>
          </div>
        </div>

        <!-- No Results -->
        <div id="noResults" style="display:none;" class="text-center py-5">
          <i class="fas fa-clipboard-list text-muted" style="font-size:3rem;"></i>
          <h4 class="mt-3 text-muted">No Results Yet</h4>
          <p class="text-muted">Complete an assessment first to see your results.</p>
          <a href="assessment.html" class="btn text-white px-4 py-2 rounded-pill"
             style="background: linear-gradient(135deg, #667eea, #764ba2);">
            <i class="fas fa-clipboard-list me-2"></i>Take Assessment
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js?v=20260312"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      requireAuth();
      updateNavbar();

      const loading = document.getElementById('loadingState');
      const content = document.getElementById('resultsContent');
      const noResults = document.getElementById('noResults');

      try {
        const res = await API.get('/predict/latest', { headers: authHeaders() });
        const result = res.data.data;

        if (!result) {
          loading.style.display = 'none';
          noResults.style.display = 'block';
          return;
        }

        renderResult(result);
        loading.style.display = 'none';
        content.style.display = 'block';
      } catch (err) {
        loading.style.display = 'none';
        noResults.style.display = 'block';
      }
    });

    function renderResult(result) {
      const riskLevel = result.riskLevel;
      const recs = result.recommendations || [];

      const colors = {
        Low: { bg: '#d1fae5', text: '#065f46', icon: '#10b981', gradient: 'linear-gradient(135deg, #d1fae5, #a7f3d0)' },
        Moderate: { bg: '#fef3c7', text: '#92400e', icon: '#f59e0b', gradient: 'linear-gradient(135deg, #fef3c7, #fde68a)' },
        High: { bg: '#fee2e2', text: '#991b1b', icon: '#ef4444', gradient: 'linear-gradient(135deg, #fee2e2, #fecaca)' },
      };

      const config = colors[riskLevel] || colors.Moderate;
      const descriptions = {
        Low: 'Your mental health indicators look good! Keep maintaining your healthy habits.',
        Moderate: 'Some areas need attention. Follow the recommendations below to improve your well-being.',
        High: 'Your responses indicate elevated risk. Please consider seeking professional support.',
      };

      document.getElementById('riskHeader').style.background = config.gradient;
      document.getElementById('riskIcon').style.color = config.icon;
      document.getElementById('riskTitle').style.color = config.text;
      document.getElementById('riskBadgeLarge').innerHTML =
        `<span class="badge fs-4 px-4 py-2 rounded-pill" style="background:${config.icon};">${riskLevel} Risk</span>`;
      document.getElementById('riskDescription').textContent = descriptions[riskLevel] || '';
      document.getElementById('riskDescription').style.color = config.text;

      const recsHtml = recs.map((r, i) => `
        <div class="d-flex align-items-start mb-3">
          <div class="rounded-circle d-flex align-items-center justify-content-center me-3 flex-shrink-0"
               style="width:32px; height:32px; background: linear-gradient(135deg, #667eea, #764ba2);">
            <span class="text-white small fw-bold">${i + 1}</span>
          </div>
          <p class="mb-0">${r}</p>
        </div>
      `).join('');
      document.getElementById('recommendationsContainer').innerHTML = recsHtml;
    }
  </script>
</body>
</html>
